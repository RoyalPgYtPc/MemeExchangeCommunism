<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News & Updates — r/MemeExchangeCommunism</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── tokens ── */
:root{
  --o:#ff4500;--oh:#e03d00;
  --os:rgba(255,69,0,.10);--ol:rgba(255,69,0,.20);
  --gold:#f5c518;--green:#22c997;--purple:#a78bfa;
  --r:12px;
  --ease:cubic-bezier(.22,1,.36,1);
  --easeb:cubic-bezier(.34,1.56,.64,1);
}
html[data-theme="dark"]{
  --bg:#0a0a0b;--bg1:#0f0f11;--bg2:#141416;--bg3:#1a1a1e;--bg4:#222228;
  --line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.03);
  --tx:#f0f0f4;--tx2:rgba(240,240,244,.55);--tx3:rgba(240,240,244,.28);--tx4:rgba(240,240,244,.10);
  --nav-bg:rgba(10,10,11,.88);
  --sh:0 1px 2px rgba(0,0,0,.4),0 8px 32px rgba(0,0,0,.25);
  --sh-lg:0 2px 4px rgba(0,0,0,.5),0 24px 64px rgba(0,0,0,.35);
  --grid-ln:rgba(255,255,255,.04);
  --glow:rgba(255,69,0,.11);
}
html[data-theme="light"]{
  --bg:#fafafa;--bg1:#f5f5f7;--bg2:#ffffff;--bg3:#f0f0f3;--bg4:#e8e8ec;
  --line:rgba(0,0,0,.07);--line2:rgba(0,0,0,.04);
  --tx:#111113;--tx2:rgba(17,17,19,.52);--tx3:rgba(17,17,19,.30);--tx4:rgba(17,17,19,.10);
  --nav-bg:rgba(250,250,250,.90);
  --sh:0 1px 2px rgba(0,0,0,.05),0 8px 32px rgba(0,0,0,.06);
  --sh-lg:0 2px 4px rgba(0,0,0,.06),0 24px 64px rgba(0,0,0,.08);
  --grid-ln:rgba(0,0,0,.04);
  --glow:rgba(255,69,0,.07);
}

/* ── reset ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--tx);
  font-family:'Geist',system-ui,sans-serif;
  line-height:1.6;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  transition:background .35s var(--ease),color .35s var(--ease);
  min-height:100vh;
}
::selection{background:var(--o);color:#fff;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--o);}
a{color:inherit;text-decoration:none;}

/* ── grid bg ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(var(--grid-ln) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-ln) 1px,transparent 1px);
  background-size:64px 64px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(0,0,0,.45),transparent 75%);
  pointer-events:none;transition:background-image .35s;
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 55% 35% at 50% -5%,var(--glow) 0%,transparent 65%);
  pointer-events:none;transition:background .35s;
}

/* ── nav ── */
.nav{
  position:sticky;top:0;z-index:200;height:58px;
  background:var(--nav-bg);border-bottom:1px solid var(--line);
  backdrop-filter:blur(20px) saturate(160%);
  -webkit-backdrop-filter:blur(20px) saturate(160%);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(1rem,4vw,2.5rem);
  transition:background .35s var(--ease);
}
.nbrand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:.88rem;color:var(--tx);}
.nlogo{width:30px;height:30px;background:var(--o);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .3s var(--easeb);}
.nbrand:hover .nlogo{transform:rotate(-12deg) scale(1.1);}
.nlinks{display:flex;gap:2px;}
.nlinks a{font-size:.8rem;font-weight:500;color:var(--tx3);padding:5px 11px;border-radius:6px;transition:color .15s,background .15s;}
.nlinks a:hover{color:var(--tx);background:var(--bg3);}
.nlinks a.active{color:var(--o);background:var(--os);}
@media(max-width:700px){.nlinks{display:none;}}
.nright{display:flex;align-items:center;gap:8px;}
.theme-btn{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--line);color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.theme-btn:hover{color:var(--tx);border-color:var(--ol);background:var(--os);}
.njoin{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--o);color:#fff;border:none;border-radius:8px;
  padding:7px 16px;font-family:'Geist',sans-serif;font-size:.82rem;font-weight:700;
  cursor:pointer;transition:background .2s,transform .2s,box-shadow .2s;
  text-decoration:none;white-space:nowrap;
}
.njoin:hover{background:var(--oh);transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,69,0,.35);}

/* ── page layout ── */
.page{
  position:relative;z-index:1;
  max-width:1100px;margin:0 auto;
  padding:clamp(3rem,7vw,5rem) clamp(1rem,4vw,2.5rem) clamp(4rem,8vw,7rem);
}

/* ── header ── */
.page-header{margin-bottom:clamp(2.5rem,5vw,4rem);}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--os);border:1px solid var(--ol);color:var(--o);
  font-size:.68rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  padding:4px 13px;border-radius:100px;margin-bottom:1.4rem;
  animation:fadeUp .5s var(--ease) both;
}
.page-h{
  font-family:'Instrument Serif',Georgia,serif;
  font-size:clamp(2.2rem,5vw,3.5rem);
  line-height:.97;letter-spacing:-1.5px;
  margin-bottom:.8rem;
  animation:fadeUp .5s .06s var(--ease) both;
}
.page-h em{color:var(--o);font-style:italic;}
.page-sub{
  font-size:clamp(.88rem,1.8vw,.98rem);font-weight:300;
  color:var(--tx2);line-height:1.7;max-width:500px;
  animation:fadeUp .5s .12s var(--ease) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}

/* ── filter bar ── */
.filters{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-bottom:2.5rem;
  animation:fadeUp .5s .18s var(--ease) both;
}
.filter-btn{
  padding:6px 14px;border-radius:100px;font-size:.78rem;font-weight:600;
  border:1px solid var(--line);background:var(--bg2);color:var(--tx3);
  cursor:pointer;transition:all .18s;letter-spacing:.2px;
}
.filter-btn:hover{border-color:var(--ol);color:var(--o);background:var(--os);}
.filter-btn.active{border-color:var(--ol);color:var(--o);background:var(--os);}
.filter-count{
  margin-left:auto;font-size:.75rem;color:var(--tx3);font-weight:500;
  white-space:nowrap;
}

/* ── search ── */
.search-wrap{
  position:relative;margin-bottom:2rem;
  animation:fadeUp .5s .22s var(--ease) both;
}
.search-ico{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--tx3);pointer-events:none;
}
.search-input{
  width:100%;padding:10px 14px 10px 42px;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r);
  font-family:'Geist',sans-serif;font-size:.88rem;color:var(--tx);
  outline:none;transition:border-color .2s,box-shadow .2s,background .2s;
}
.search-input::placeholder{color:var(--tx3);}
.search-input:focus{border-color:var(--ol);background:var(--bg2);box-shadow:0 0 0 3px rgba(255,69,0,.10);}

/* ── pinned article (featured) ── */
.pinned-card{
  display:grid;grid-template-columns:1fr 380px;gap:0;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:16px;overflow:hidden;
  margin-bottom:2.5rem;
  box-shadow:var(--sh);
  transition:border-color .25s,transform .25s var(--ease),box-shadow .25s;
  animation:fadeUp .5s .26s var(--ease) both;
  text-decoration:none;color:inherit;
}
.pinned-card:hover{border-color:var(--ol);transform:translateY(-3px);box-shadow:var(--sh-lg);}
@media(max-width:820px){.pinned-card{grid-template-columns:1fr;}}
.pinned-img{
  background:var(--bg3);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  min-height:220px;
  position:relative;
}
.pinned-img img{width:100%;height:100%;object-fit:cover;}
.pinned-img-placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
  color:var(--tx3);font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;
}
.pinned-img-placeholder svg{opacity:.35;}
.pinned-body{padding:clamp(1.4rem,3vw,2.2rem);display:flex;flex-direction:column;justify-content:space-between;gap:1rem;}
.pinned-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pin-label{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:3px 9px;border-radius:100px;
  background:var(--os);border:1px solid var(--ol);color:var(--o);
}
.a-tag-pill{
  font-size:.62rem;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;
  padding:3px 9px;border-radius:100px;border:1px solid;
}
.tag-Announcement{color:var(--o);border-color:var(--ol);background:var(--os);}
.tag-MemeCoin{color:var(--gold);border-color:rgba(245,197,24,.3);background:rgba(245,197,24,.08);}
.tag-Milestone{color:var(--purple);border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.08);}
.tag-Election{color:var(--green);border-color:rgba(34,201,151,.3);background:rgba(34,201,151,.08);}
.tag-Update{color:#60a5fa;border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.08);}
.tag-default{color:var(--tx3);border-color:var(--line);background:transparent;}
.a-date-sm{font-size:.75rem;color:var(--tx3);font-weight:500;}
.pinned-title{
  font-family:'Instrument Serif',serif;
  font-size:clamp(1.3rem,3vw,1.75rem);
  line-height:1.1;letter-spacing:-.4px;color:var(--tx);
}
.pinned-desc{font-size:.88rem;color:var(--tx2);line-height:1.7;font-weight:300;}
.read-link{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.8rem;font-weight:700;color:var(--o);
  transition:gap .2s;
}
.pinned-card:hover .read-link{gap:10px;}

/* ── article grid ── */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:560px){.grid{grid-template-columns:1fr;}}

/* ── article card ── */
.card{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;
  display:flex;flex-direction:column;
  transition:border-color .25s,transform .25s var(--ease),box-shadow .25s;
  text-decoration:none;color:inherit;
  position:relative;
}
.card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--o),transparent);
  transform:scaleX(0);transform-origin:left;transition:transform .3s var(--ease);
}
.card:hover{border-color:var(--ol);transform:translateY(-3px);box-shadow:var(--sh);}
.card:hover::after{transform:scaleX(1);}

.card-img{
  width:100%;aspect-ratio:16/8;
  background:var(--bg3);
  overflow:hidden;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease);}
.card:hover .card-img img{transform:scale(1.04);}
.card-img-placeholder{
  color:var(--tx4);
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;
}
.card-body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:10px;flex:1;}
.card-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.card-title{
  font-family:'Instrument Serif',serif;
  font-size:1.1rem;line-height:1.15;letter-spacing:-.2px;
  color:var(--tx);
}
.card-desc{font-size:.82rem;color:var(--tx2);line-height:1.65;font-weight:300;flex:1;}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:1px solid var(--line2);
  margin-top:auto;
}
.card-date{font-size:.72rem;color:var(--tx3);font-weight:500;}
.card-arrow{
  color:var(--tx3);transition:color .2s,transform .2s;
}
.card:hover .card-arrow{color:var(--o);transform:translateX(3px);}

/* ── empty / loading states ── */
.state{
  grid-column:1/-1;
  text-align:center;padding:5rem 1rem;
  color:var(--tx3);
}
.state h3{
  font-family:'Instrument Serif',serif;
  font-size:1.6rem;color:var(--tx2);
  margin-bottom:.6rem;letter-spacing:-.3px;
}
.state p{font-size:.88rem;line-height:1.65;}

/* skeleton shimmer */
.skel{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r);overflow:hidden;
  animation:shimmer 1.5s ease infinite;
}
.skel-img{width:100%;aspect-ratio:16/8;background:var(--bg3);}
.skel-body{padding:18px 20px 20px;}
.skel-line{height:10px;background:var(--bg3);border-radius:4px;margin-bottom:10px;}
.skel-line.w60{width:60%;}
.skel-line.w80{width:80%;}
.skel-line.w40{width:40%;}
@keyframes shimmer{
  0%,100%{opacity:1;}
  50%{opacity:.55;}
}

/* ── no results ── */
.no-results{
  grid-column:1/-1;
  padding:4rem 1rem;text-align:center;
  color:var(--tx3);font-size:.9rem;
}

</style>
</head>

<script>
/* ── theme ── */
function toggleTheme(){
  var h=document.documentElement,d=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',d?'light':'dark');
  document.getElementById('ico-sun').style.display=d?'none':'block';
  document.getElementById('ico-moon').style.display=d?'block':'none';
}

/* ── state ── */
var ALL=[], activeTag='all';

/* ── tag colour helper ── */
var TAG_CLASS={
  'Announcement':'tag-Announcement',
  'MemeCoin':'tag-MemeCoin',
  'Milestone':'tag-Milestone',
  'Election':'tag-Election',
  'Update':'tag-Update'
};
function tagClass(t){ return TAG_CLASS[t]||'tag-default'; }

/* ── date formatter ── */
function fmtDate(iso){
  if(!iso) return '';
  var d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
}

/* ── banner helper ── */
function bannerHTML(banner,title){
  if(banner && banner.trim()){
    return '<img src="'+escH(banner)+'" alt="'+escH(title)+'" loading="lazy">';
  }
  return '<div class="card-img-placeholder"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>';
}
function bannerHtmlPinned(banner,title){
  if(banner && banner.trim()){
    return '<img src="'+escH(banner)+'" alt="'+escH(title)+'" loading="lazy" style="width:100%;height:100%;object-fit:cover;">';
  }
  return '<div class="pinned-img-placeholder"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>No banner</span></div>';
}
function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── filter ── */
function setFilter(btn){
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  activeTag = btn.dataset.tag;
  render();
}

/* ── search + filter + render ── */
function render(){
  var q = (document.getElementById('search').value||'').toLowerCase().trim();
  var filtered = ALL.filter(function(a){
    var tagOk = activeTag==='all' || a.tag===activeTag;
    var qOk   = !q || (a.title+' '+a.desc+' '+a.tag).toLowerCase().indexOf(q)!==-1;
    return tagOk && qOk;
  });

  // sort: pinned first, then newest
  filtered.sort(function(a,b){
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    return (b.date||'').localeCompare(a.date||'');
  });

  document.getElementById('count-lbl').textContent = filtered.length + ' article' + (filtered.length!==1?'s':'');

  var el = document.getElementById('content');
  if(!filtered.length){
    el.innerHTML='<div class="no-results">No articles match "'+escH(q)+'".</div>';
    return;
  }

  var html='';
  var pinned = filtered.filter(function(a){return a.pinned;});
  var rest   = filtered.filter(function(a){return !a.pinned;});

  // pinned → featured card
  pinned.forEach(function(a){
    html+='<a class="pinned-card" href="news/'+escH(a.file)+'">';
    html+='<div class="pinned-img">'+bannerHtmlPinned(a.banner,a.title)+'</div>';
    html+='<div class="pinned-body">';
    html+='<div class="pinned-meta"><span class="pin-label">★ Pinned</span><span class="a-tag-pill '+tagClass(a.tag)+'">'+escH(a.tag)+'</span><span class="a-date-sm">'+fmtDate(a.date)+'</span></div>';
    html+='<div><div class="pinned-title">'+escH(a.title)+'</div></div>';
    html+='<div class="pinned-desc">'+escH(a.desc)+'</div>';
    html+='<span class="read-link">Read article <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>';
    html+='</div></a>';
  });

  // rest → grid
  if(rest.length){
    html+='<div class="grid">';
    rest.forEach(function(a){
      html+='<a class="card" href="news/'+escH(a.file)+'">';
      html+='<div class="card-img">'+bannerHTML(a.banner,a.title)+'</div>';
      html+='<div class="card-body">';
      html+='<div class="card-meta"><span class="a-tag-pill '+tagClass(a.tag)+'">'+escH(a.tag)+'</span></div>';
      html+='<div class="card-title">'+escH(a.title)+'</div>';
      html+='<div class="card-desc">'+escH(a.desc)+'</div>';
      html+='<div class="card-footer"><span class="card-date">'+fmtDate(a.date)+'</span><svg class="card-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>';
      html+='</div></a>';
    });
    html+='</div>';
  }

  el.innerHTML=html;

  // stagger card entrance
  var cards = el.querySelectorAll('.card,.pinned-card');
  cards.forEach(function(c,i){
    c.style.opacity='0';c.style.transform='translateY(16px)';c.style.transition='none';
    setTimeout(function(){
      c.style.transition='opacity .45s var(--ease),transform .45s var(--ease)';
      c.style.transitionDelay=(i*0.07)+'s';
      c.style.opacity='1';c.style.transform='none';
    },20);
  });
}

/* ── build tag filter buttons ── */
function buildFilters(articles){
  var tags = [];
  articles.forEach(function(a){ if(a.tag && tags.indexOf(a.tag)===-1) tags.push(a.tag); });
  var html='';
  tags.forEach(function(t){
    html+='<button class="filter-btn" data-tag="'+escH(t)+'" onclick="setFilter(this)">'+escH(t)+'</button>';
  });
  document.getElementById('tag-filters').innerHTML=html;
}

/* ── fetch manifest ── */
fetch('news/index.json')
  .then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  })
  .then(function(data){
    ALL = data;
    document.getElementById('skeleton').remove();
    buildFilters(ALL);
    render();
  })
  .catch(function(err){
    document.getElementById('skeleton').remove();
    document.getElementById('content').innerHTML=
      '<div class="state"><h3>Couldn\'t load articles</h3><p>Make sure <code>news/index.json</code> exists and is valid JSON.<br><small style="opacity:.6">'+err.message+'</small></p></div>';
  });
</script>
</body>
</html>
